name: nayax-vendsys-dex-console

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Express
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/1433'"]
      interval: 10s
      timeout: 3s
      retries: 30

  api:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      BasicAuth__Username: vendsys
      BasicAuth__Password: NFsZGmHAGWJSZ#RuvdiV
      Persistence__ConnectionString: Server=sqlserver,1433;Database=VendSysDex;User Id=sa;Password=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=True;Encrypt=False
      DatabaseInitializer__RunOnStartup: "true"
      DatabaseInitializer__ScriptsPath: /app/database/scripts
      Swagger__Enabled: "true"
      Cors__AllowedOrigins__0: http://localhost:${FRONTEND_PORT:-3000}
      Cors__AllowedOrigins__1: http://localhost:5173
    ports:
      - "${API_PORT:-8080}:8080"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_SIGNALR_HUB_URL: ${VITE_SIGNALR_HUB_URL:-http://localhost:8080/hubs/dex-processing}
        VITE_SYNCFUSION_LICENSE_KEY: ${VITE_SYNCFUSION_LICENSE_KEY:-}
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  sqlserver-data:
